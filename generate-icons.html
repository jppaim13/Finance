<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerar Ícones</title>
<style>
  body { font-family: sans-serif; background: #0f1117; color: #fff; display: flex;
         flex-direction: column; align-items: center; justify-content: center;
         min-height: 100vh; gap: 24px; margin: 0; }
  button { background: #5b7fff; color: #fff; border: none; border-radius: 10px;
           padding: 14px 28px; font-size: 16px; cursor: pointer; }
  button:hover { background: #4a6ef5; }
  canvas { display: none; }
  #preview { border-radius: 22%; width: 120px; height: 120px; }
  p { color: #aaa; font-size: 14px; text-align: center; max-width: 360px; }
</style>
</head>
<body>

<img id="preview" alt="preview">
<p>Clique em cada botão para baixar o arquivo PNG correspondente.<br>
Coloque os 3 arquivos na mesma pasta do <strong>index.html</strong>.</p>

<button onclick="download(180, 'icon-180.png')">⬇ Baixar icon-180.png (iOS)</button>
<button onclick="download(192, 'icon-192.png')">⬇ Baixar icon-192.png (Android)</button>
<button onclick="download(512, 'icon-512.png')">⬇ Baixar icon-512.png (Splash)</button>

<canvas id="c"></canvas>

<script>
const SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="110" fill="#1a1f2e"/>
  <rect x="40" y="40" width="432" height="432" rx="80" fill="#1a1f2e"/>
  <circle cx="256" cy="230" r="130" fill="none" stroke="#5b7fff" stroke-width="22"/>
  <text x="256" y="295" font-family="Arial Black, Arial, sans-serif" font-size="180" font-weight="900" fill="#5b7fff" text-anchor="middle">$</text>
  <rect x="80" y="400" width="60" height="50" rx="8" fill="#22c55e" opacity=".9"/>
  <rect x="160" y="370" width="60" height="80" rx="8" fill="#5b7fff" opacity=".9"/>
  <rect x="240" y="390" width="60" height="60" rx="8" fill="#5b7fff" opacity=".7"/>
  <rect x="320" y="355" width="60" height="95" rx="8" fill="#22c55e" opacity=".9"/>
  <rect x="400" y="380" width="60" height="70" rx="8" fill="#5b7fff" opacity=".6"/>
</svg>`;

const svgDataUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(SVG);

// Show preview
document.getElementById('preview').src = svgDataUrl;

function download(size, filename) {
  const img = new Image();
  img.onload = () => {
    const c = document.getElementById('c');
    c.width = size;
    c.height = size;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, size, size);
    ctx.drawImage(img, 0, 0, size, size);
    c.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(a.href), 1000);
    }, 'image/png');
  };
  img.src = svgDataUrl;
}
</script>
</body>
</html>
